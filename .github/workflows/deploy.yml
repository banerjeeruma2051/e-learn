name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Adjust this if your default branch is different

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: elearn-frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: elearn-frontend

      - name: Build project
        run: npm run build
        working-directory: elearn-frontend

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: elearn-frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
